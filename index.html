<style>

<body>
<div id="app"></div>
<script>
  const API='https://script.google.com/macros/s/AKfycbyi_H2G8ZsjwFhvUyZpQB7u1Y7EI-KNJlZiOfAhnQioxgXnMQ9oCciqFUv1NdiwPLxb/exec';
const SHOPS=["Shop 1 – Main","Shop 2 – Branch"];
const DL=["₹500","₹200","₹100","₹50","₹20","₹10","Coins"];
const DV=[500,200,100,50,20,10,1];
const ECATS=["Staff Food","Transport","Maintenance","Fuel","Electricity","Packaging","Misc"];
const fmt=n=>'₹'+Number(n||0).toLocaleString('en-IN');
const fmtD=d=>new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const toISO=d=>{const x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')};
const today=()=>toISO(new Date());
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const dTotal=a=>a.reduce((s,c,i)=>s+c*DV[i],0);
const sf=(a,f)=>a.reduce((s,r)=>s+(r[f]||0),0);
const af=(a,f)=>a.length?sf(a,f)/a.length:0;
const $=s=>document.querySelector(s);
const el=(t,a={},...k)=>{const e=document.createElement(t);for(const[n,v]of Object.entries(a)){if(n==='style'&&typeof v==='object')Object.assign(e.style,v);else if(n.startsWith('on'))e.addEventListener(n.slice(2).toLowerCase(),v);else if(n==='className')e.className=v;else if(n==='html')e.innerHTML=v;else if(typeof v==='boolean'){if(v)e.setAttribute(n,'');else e.removeAttribute(n);}else e.setAttribute(n,v)}k.flat(9).forEach(c=>{if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c)});return e};

async function api(action,params={},body=null){
  const url=new URL(API);
  url.searchParams.set('action',action);
  for(const[k,v]of Object.entries(params))url.searchParams.set(k,v);
  let res;
  if(body){url.searchParams.set('payload',JSON.stringify(body));
    res=await fetch(url.toString(),{method:'GET',redirect:'follow'});
    
  }else{
    res=await fetch(url.toString(),{method:'GET',redirect:'follow'});
  }
  const text=await res.text();
  let data;
  try{data=JSON.parse(text);}catch(e){
    const match=text.match(/href="([^"]+)"/);
    if(match){const r2=await fetch(match[1]);data=await r2.json();}
    else{throw new Error('Server error');}
  }
  if(!data.success&&data.error)throw new Error(data.error);
  return data;
}

const S={screen:'login',role:null,tab:0,shop:0,date:today(),records:[],loading:false,saving:false,oc:[0,0,0,0,0,0,0],cc:[0,0,0,0,0,0,0],upi:0,billed:0,walk:0,exps:[],vends:[],notes:'',pinShow:false,pinVal:'',pinErr:'',connected:false};

function loadForm(){
  const r=S.records.find(x=>x.shop==S.shop&&x.date===S.date);
  if(r){S.oc=r.openingCash?[...r.openingCash]:[0,0,0,0,0,0,0];S.cc=r.closingCash?[...r.closingCash]:[0,0,0,0,0,0,0];S.upi=r.upiReceived||0;S.billed=r.totalBilled||0;S.walk=r.walkIns||0;S.exps=r.expenses?r.expenses.map(e=>({...e})):[];S.vends=r.vendorPayments?r.vendorPayments.map(v=>({...v})):[];S.notes=r.notes||'';}
  else{S.oc=[0,0,0,0,0,0,0];S.cc=[0,0,0,0,0,0,0];S.upi=0;S.billed=0;S.walk=0;S.exps=[];S.vends=[];S.notes='';}
}
async function fetchRecords(){S.loading=true;render();try{const res=await api('getAll',{role:S.role});S.records=res.data||[];S.connected=true;}catch(e){toast('❌ '+e.message);S.connected=false;}S.loading=false;loadForm();render();}
function toast(msg){const old=document.querySelector('.toast');if(old)old.remove();const t=el('div',{className:'toast'},msg);document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

function render(){const app=$('#app');app.innerHTML='';if(S.loading)app.appendChild(el('div',{className:'loading-bar'}));if(S.screen==='login')app.appendChild(rLogin());else app.appendChild(rApp());if(S.pinShow)app.appendChild(rPin());}

function rLogin(){return el('div',{className:'login-screen'},el('div',{className:'login-logo'},'🍞'),el('div',{className:'login-title'},'Akshay Bakery'),el('div',{className:'login-sub'},'Daily Business Tracker'),el('button',{className:'login-btn owner',onClick:()=>{S.pinShow=true;S.pinVal='';S.pinErr='';render();}},'🔐  Owner Login'),el('button',{className:'login-btn staff',onClick:async()=>{S.role='staff';S.screen='app';S.tab=0;await fetchRecords();}},'👤  Staff Entry'));}

function rPin(){const ov=el('div',{className:'overlay'});ov.appendChild(el('div',{className:'modal'},el('h3',{},'Owner PIN'),el('p',{},'Enter 4-digit PIN to access full dashboard'),el('input',{className:'pin-input',type:'password',maxlength:'4',inputmode:'numeric',placeholder:'••••',value:S.pinVal,onInput:e=>{S.pinVal=e.target.value;S.pinErr='';render();setTimeout(()=>{const i=document.querySelector('.pin-input');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}},0);}}),S.pinErr?el('div',{className:'pin-error'},S.pinErr):null,el('div',{className:'modal-actions'},el('button',{className:'btn-cancel',onClick:()=>{S.pinShow=false;render();}},'Cancel'),el('button',{className:'btn-confirm',onClick:async()=>{try{const res=await api('verifyPin',{pin:S.pinVal});if(res.valid){S.pinShow=false;S.role='owner';S.screen='app';S.tab=0;await fetchRecords();}else{S.pinErr='Wrong PIN';render();}}catch(e){S.pinErr=e.message;render();}}},'Enter'))));ov.addEventListener('click',e=>{if(e.target===ov){S.pinShow=false;render();}});return ov;}

function rApp(){const isO=S.role==='owner';const tabs=isO?[{i:'📝',l:'Entry'},{i:'📋',l:'History'},{i:'📊',l:'Dashboard'},{i:'⚙️',l:'Settings'}]:[{i:'📝',l:'Entry'},{i:'📋',l:'History'}];const hdr=el('div',{className:'app-header'},el('div',{className:'header-row'},el('div',{className:'header-left'},el('div',{className:'header-icon'},'🍞'),el('div',{},el('div',{className:'header-title'},'Akshay Bakery'),el('div',{className:'header-role'},el('span',{className:'sync-dot '+(S.connected?'on':'off')}),isO?'Owner • Cloud':'Staff • Cloud'))),el('div',{style:{display:'flex',gap:'6px'}},el('button',{className:'logout-btn',onClick:async()=>{S.loading=true;render();await fetchRecords();toast('🔄 Synced!');},html:'↻'}),el('button',{className:'logout-btn',onClick:()=>{S.screen='login';S.role=null;S.tab=0;S.records=[];render();}},'Logout'))),el('div',{className:'tab-bar'},...tabs.map((t,i)=>el('button',{className:'tab-btn'+(S.tab===i?' on':''),onClick:()=>{S.tab=i;if(i===0)loadForm();render();}},t.i+' '+t.l))));const body=el('div',{className:'app-body'});if(S.tab===0)body.appendChild(rEntry());else if(S.tab===1)body.appendChild(rHistory());else if(S.tab===2&&isO)body.appendChild(rDash());else if(S.tab===3&&isO)body.appendChild(rSettings());return el('div',{},hdr,body);}
  function rEntry(){const f=el('div',{});f.appendChild(el('div',{className:'fr c2'},fg('Date',el('input',{className:'fi',type:'date',value:S.date,onChange:e=>{S.date=e.target.value;loadForm();render();}})),fg('Shop',mkSel(SHOPS,S.shop,v=>{S.shop=parseInt(v);loadForm();render();}))));const ex=S.records.find(r=>r.shop==S.shop&&r.date===S.date);if(ex)f.appendChild(el('div',{className:'wb'},el('span',{},'⚠️'),el('span',{},'Editing existing entry')));
f.appendChild(mkCard('🌅','g','Opening Cash','Cash at start',mkDenom(S.oc,'oc')));
