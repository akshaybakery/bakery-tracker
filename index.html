function formatProductionOrder(lang){
  var d=new Date(S.date+'T00:00:00').toLocaleDateString(lang==='ml'?'ml-IN':'en-IN',{weekday:'long',day:'2-digit',month:'short',year:'numeric'});
  var prodMap=getOrderData();
  var icons={'Baking':'\uD83C\uDF5E','Oil Work':'\uD83C\uDF5F','Sweets':'\uD83C\uDF6C','Cream Cakes':'\uD83C\uDF82'};
  var totalQty=0,totalItems=0;
  var isML=lang==='ml';
  var msg='\uD83C\uDF5E *AKSHAY BAKERY - '+(isML?ML.order:'PRODUCTION ORDER')+'*\n';
  msg+='\uD83D\uDCC5 '+d+'\n';
  msg+='\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n';
  for(var c=0;c<PCATS.length;c++){
    var cat=PCATS[c];
    var catItems=[];for(var k in prodMap){if(prodMap[k].cat===cat)catItems.push({name:k,data:prodMap[k]})}
    if(!catItems.length)continue;
    msg+=(icons[cat]||'')+' *'+(isML?ML[cat]||cat:cat.toUpperCase())+'*\n';
    for(var i=0;i<catItems.length;i++){
      var p=catItems[i],total=p.data.s0+p.data.s1;
      msg+='\u2022 '+p.name+' \u2014 *'+total+' '+(isML?mlUnit(p.data.unit):p.data.unit)+'*';
      if(p.data.notes)msg+=' ('+p.data.notes+')';
      msg+='\n';
      totalQty+=total;totalItems++;
    }
    msg+='\n';
  }
  msg+='\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n';
  msg+='\uD83D\uDCE6 *'+(isML?ML.total:' Total')+': '+totalItems+' '+(isML?ML.items:'items')+', '+totalQty+' '+(isML?ML.units:'units')+'*\n';
  msg+='\u23F0 '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  return msg;
}

function collectProductOrders(dt){
  var recs0=recsForDateShop(dt,0),recs1=recsForDateShop(dt,1);
  var orders0=[],orders1=[];
  for(var i=0;i<recs0.length;i++){var po=recs0[i].productOrders||[];for(var j=0;j<po.length;j++)orders0.push(po[j])}
  for(var i=0;i<recs1.length;i++){var po=recs1[i].productOrders||[];for(var j=0;j<po.length;j++)orders1.push(po[j])}
  for(var i=0;i<(S.prodOrderRecords||[]).length;i++){var por=S.prodOrderRecords[i];if(por.date===dt){var pOrds=por.productOrders||[];for(var j=0;j<pOrds.length;j++){var dup=false;var tgt=parseInt(por.shop)===0?orders0:orders1;for(var m=0;m<tgt.length;m++){if(tgt[m].id===pOrds[j].id){dup=true;break}}if(!dup)tgt.push(pOrds[j])}}}
  return{orders0:orders0,orders1:orders1,all:orders0.concat(orders1)}
}

  out+='<div style="margin-top:8px;text-align:right"><button class="ab g" id="addAdvItem">+ Add Item</button></div></div>';

  if(S.advItems.length){
    out+='<button class="save-btn'+(S.saving?' off':'')+'" id="saveAdvOrder" style="margin-top:10px">'+(S.saving?'\u23F3 Saving...':'\uD83D\uDCCB Save Customer Order ('+S.advItems.length+' item'+(S.advItems.length>1?'s':'')+')') +'</button>';
  }
  out+='</div>';

  // List upcoming customer orders
  var upcoming=[];for(var i=0;i<S.advOrders.length;i++){if(S.advOrders[i].deliveryDate>=today())upcoming.push(S.advOrders[i])}
  upcoming.sort(function(a,b){return a.deliveryDate<b.deliveryDate?-1:a.deliveryDate>b.deliveryDate?1:0});

  if(upcoming.length){
    out+='<div class="card"><div class="ch"><div class="ci g">\uD83D\uDCC5</div><div><div class="ct">Upcoming Orders</div><div class="cs">'+upcoming.length+' pending customer order'+(upcoming.length>1?'s':'')+'</div></div></div>';
    var curDate='';
    for(var i=0;i<upcoming.length;i++){
      var a=upcoming[i];
      if(a.deliveryDate!==curDate){curDate=a.deliveryDate;var dl=new Date(curDate+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'});var isToday=curDate===today();out+='<div style="font-size:11px;font-weight:700;color:'+(isToday?'var(--green)':'var(--text2)')+';margin:'+(i>0?'12px':'4px')+' 0 6px;text-transform:uppercase;letter-spacing:.5px">\uD83D\uDCC5 '+dl+(isToday?' \u2022 TODAY':'')+'</div>'}

    }
    out+='</div>';
  }

  // Past orders
  var past=[];for(var i=0;i<S.advOrders.length;i++){if(S.advOrders[i].deliveryDate<today())past.push(S.advOrders[i])}
  if(past.length){

  return out;
}

/* ===== PRODUCTION ORDERS (Combined View) ===== */
function renderProductionOrders(){
  var out='<div class="fg" style="margin-bottom:12px"><div class="fl">Date</div><input class="fi" type="date" id="prodOrderDate" value="'+S.orderDate+'"></div>';

  var cp=collectProductOrders(S.orderDate);var orders0=cp.orders0,orders1=cp.orders1,allOrders=cp.all;

  // Build consolidated product map (same product from both shops = single line)
  var prodMap={};
  for(var i=0;i<orders0.length;i++){var o=orders0[i];var k=o.product;if(!prodMap[k])prodMap[k]={cat:o.category||'Baking',unit:o.unit||'pcs',total:0,notes:o.notes||''};prodMap[k].total+=o.qty||0}
  for(var i=0;i<orders1.length;i++){var o=orders1[i];var k=o.product;if(!prodMap[k])prodMap[k]={cat:o.category||'Baking',unit:o.unit||'pcs',total:0,notes:o.notes||''};prodMap[k].total+=o.qty||0}

  var uniqueItems=Object.keys(prodMap).length;
  var totalQty=0;for(var k in prodMap)totalQty+=prodMap[k].total;

  out+='<div class="order-summary"><div class="order-summary-grid"><div class="order-summary-item"><div class="order-summary-val">'+uniqueItems+'</div><div class="order-summary-lbl">Products</div></div><div class="order-summary-item"><div class="order-summary-val">'+totalQty+'</div><div class="order-summary-lbl">Total Qty</div></div></div></div>';

  if(!uniqueItems){out+='<div class="es"><div class="esi">\uD83D\uDCE6</div><div class="est">No orders for this date.<br>Shop staff can add orders from their login.</div></div>';return out}

  // Show single consolidated list grouped by category
  var icons={'Baking':'\uD83C\uDF5E','Oil Work':'\uD83C\uDF5F','Sweets':'\uD83C\uDF6C','Cream Cakes':'\uD83C\uDF82'};
  for(var c=0;c<PCATS.length;c++){
    var cat=PCATS[c];
    var catItems=[];for(var k in prodMap){if(prodMap[k].cat===cat)catItems.push({name:k,data:prodMap[k]})}
    if(!catItems.length)continue;
    var catQty=0;for(var i=0;i<catItems.length;i++)catQty+=catItems[i].data.total;

    out+='<div class="card"><div class="ch"><div class="ci '+(c===0?'a':c===1?'b':'p')+'">'+(icons[cat]||'\uD83D\uDCE6')+'</div><div><div class="ct">'+cat+'</div><div class="cs">'+catItems.length+' products \u2022 '+catQty+' total qty</div></div></div>';
    for(var i=0;i<catItems.length;i++){
      var p=catItems[i];
      out+='<div class="order-item"><div><div style="font-weight:600;font-size:14px">'+esc(p.name)+'</div>';
      if(p.data.notes)out+='<div style="font-size:10px;color:var(--text3)">'+esc(p.data.notes)+'</div>';
      out+='</div><div class="order-qty" style="font-size:16px;font-weight:700">'+p.data.total+' '+p.data.unit+'</div></div>';
    }
    out+='</div>';
  }
  return out;
}

/* ===== RECIPE BOOK ===== */
function resetRcpForm(){S.rcpForm={name:'',cat:'Baking',yield:'',yieldUnit:'pcs',prep:'',bake:'',temp:'',ings:[{name:'All Purpose Flour (Maida)',qty:'1000',unit:'g',isFlour:true},{name:'',qty:'',unit:'g',isFlour:false},{name:'',qty:'',unit:'g',isFlour:false}],steps:[''],notes:'',shelf:'',storage:''}}
function calcBakersPct(ings){
  var flourQty=0;for(var i=0;i<ings.length;i++){if(ings[i].isFlour)flourQty+=parseFloat(ings[i].qty)||0}
  if(!flourQty)return ings;
  for(var i=0;i<ings.length;i++){ings[i].pct=flourQty>0?((parseFloat(ings[i].qty)||0)/flourQty*100):0}
  return ings;
}

function renderRecipeBook(){
  if(S.rcpView>=0)return renderRecipeDetail(S.rcpView);
  if(S.rcpAdding)return renderRecipeForm();

  var out='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-size:18px;font-weight:700">\uD83D\uDCD6 Recipe Book</h2>'+(S.role!=='staff'?'<button class="ab g" id="addRecipeBtn">+ New Recipe</button>':'')+'</div>';

  if(!S.recipes.length){out+='<div class="es"><div class="esi">\uD83D\uDCD6</div><div class="est">No recipes yet.<br>Add your first recipe card!</div></div>';return out}

  // Group by category
  for(var c=0;c<PCATS.length;c++){
    var cat=PCATS[c];
    var catRecipes=S.recipes.filter(function(r){return r.category===cat});
    if(!catRecipes.length)continue;
    var icons={'Baking':'\uD83C\uDF5E','Oil Work':'\uD83C\uDF5F','Sweets':'\uD83C\uDF6C','Cream Cakes':'\uD83C\uDF82'};
    out+='<div class="order-cat-hdr">'+(icons[cat]||'')+' '+cat+' ('+catRecipes.length+')</div>';
    for(var i=0;i<catRecipes.length;i++){
      var r=catRecipes[i];var idx=-1;for(var j=0;j<S.recipes.length;j++){if(S.recipes[j]===r){idx=j;break}}
      var ingCount=(r.ingredients||[]).length;
      var catCls=cat==='Baking'?'baking':cat==='Oil Work'?'oil':'sweets';
      out+='<div class="rcp-card" data-viewrcp="'+idx+'"><div class="rcp-header"><div class="rcp-name">'+r.name+'</div><div class="rcp-cat-badge '+catCls+'">'+cat+'</div></div>';
      out+='<div style="display:flex;gap:12px;font-size:11px;color:var(--text2)">';
      if(r.yield)out+='<span>\uD83C\uDF82 '+r.yield+' '+r.yieldUnit+'</span>';
      if(r.prepTime)out+='<span>\u23F1 '+r.prepTime+'m prep</span>';
      if(r.bakeTime)out+='<span>\uD83D\uDD25 '+r.bakeTime+'m bake</span>';
      if(r.ovenTemp)out+='<span>\uD83C\uDF21 '+r.ovenTemp+'\u00B0C</span>';
      out+='</div>';
      out+='<div style="font-size:10px;color:var(--text3);margin-top:4px">'+ingCount+' ingredients \u2022 '+(r.method||[]).length+' steps</div></div>';
    }
  }

  out+='<div style="text-align:center;padding:16px;font-size:10px;color:var(--text3);line-height:1.6">Recipe cards follow the <strong>Baker\'s Percentage</strong> standard<br>All ingredients expressed as % of flour weight (flour = 100%)</div>';
  return out;
}

function renderRecipeDetail(idx){
  var r=S.recipes[idx];if(!r)return'<div class="es">Recipe not found</div>';
  var out='<button class="rcp-back" id="rcpBackBtn">\u276E Back to Recipe Book</button>';
  var catCls=r.category==='Baking'?'baking':r.category==='Oil Work'?'oil':'sweets';
  out+='<div class="card"><div class="rcp-header"><div class="rcp-name">'+r.name+'</div><div class="rcp-cat-badge '+catCls+'">'+r.category+'</div></div>';

  // Meta
  out+='<div class="rcp-meta">';
  if(r.yield)out+='<div class="rcp-meta-item"><div class="rcp-meta-lbl">Yield</div><div class="rcp-meta-val">'+r.yield+'</div></div>';
  if(r.yieldUnit)out+='<div class="rcp-meta-item"><div class="rcp-meta-lbl">Unit</div><div class="rcp-meta-val">'+r.yieldUnit+'</div></div>';
  if(r.prepTime)out+='<div class="rcp-meta-item"><div class="rcp-meta-lbl">Prep</div><div class="rcp-meta-val">'+r.prepTime+' min</div></div>';
  if(r.bakeTime)out+='<div class="rcp-meta-item"><div class="rcp-meta-lbl">Bake</div><div class="rcp-meta-val">'+r.bakeTime+' min</div></div>';
  if(r.ovenTemp)out+='<div class="rcp-meta-item"><div class="rcp-meta-lbl">Temp</div><div class="rcp-meta-val">'+r.ovenTemp+'\u00B0C</div></div>';
  out+='</div>';

  // Ingredients table with Baker's %
  var ings=r.ingredients||[];
  ings=calcBakersPct(ings);
  var totalWt=0;for(var i=0;i<ings.length;i++)totalWt+=parseFloat(ings[i].qty)||0;
  if(ings.length){
    out+='<div class="rcp-sec-title">Ingredients</div>';
    out+='<table class="rcp-ing-tbl"><thead><tr><th>Ingredient</th><th>Qty</th><th>Unit</th><th>Baker\'s %</th></tr></thead><tbody>';
    for(var i=0;i<ings.length;i++){
      var ing=ings[i];
      out+='<tr'+(ing.isFlour?' class="flour-row"':'')+'><td>'+(ing.isFlour?'\uD83C\uDF3E ':'')+(ing.name||'\u2014')+'</td><td>'+ing.qty+'</td><td>'+ing.unit+'</td><td>'+(ing.pct!==undefined?ing.pct.toFixed(1)+'%':'\u2014')+'</td></tr>';
    }
    out+='<tr><td><strong>Total</strong></td><td><strong>'+totalWt+'</strong></td><td>g</td><td></td></tr>';
    out+='</tbody></table>';
  }

  // Method
  var steps=r.method||[];
  if(steps.length&&steps[0]){
    out+='<div class="rcp-sec-title">Method</div>';
    for(var i=0;i<steps.length;i++){if(steps[i])out+='<div class="rcp-step"><div class="rcp-step-num">'+(i+1)+'</div><div>'+steps[i]+'</div></div>'}
  }

  // Notes
  if(r.notes)out+='<div class="rcp-sec-title">Notes</div><div class="rcp-notes">\uD83D\uDCA1 '+r.notes+'</div>';

  // Storage & Shelf Life
  if(r.shelfLife||r.storage){
    out+='<div class="rcp-storage">';
    if(r.storage)out+='<div class="rcp-storage-item"><div class="rcp-storage-lbl">\uD83D\uDCE6 Storage</div>'+r.storage+'</div>';
    if(r.shelfLife)out+='<div class="rcp-storage-item"><div class="rcp-storage-lbl">\u23F3 Shelf Life</div>'+r.shelfLife+'</div>';
    out+='</div>';
  }

  out+='</div>';

  // Delete button for production staff
  if(S.role==='production'||S.role==='owner')out+='<button class="rcp-del" data-delrcp="'+idx+'">\uD83D\uDDD1 Delete Recipe</button>';
  return out;
}

  }
  out+='<button class="ab g" id="addRcpStep" style="margin-top:4px">+ Empty Step</button></div></div>';

  // ─── STORAGE & NOTES ───
  out+='<div class="card"><div class="rcp-form-sec"><div class="rcp-form-sec-title">\uD83D\uDCE6 Storage & Notes</div>';
  out+='<div class="fr c2"><div class="fg"><div class="fl">\uD83D\uDCE6 Storage</div><select class="fi" id="rcpStorage"><option value=""'+(f.storage===''?' selected':'')+'>Select storage...</option>';
  for(var i=0;i<STORAGE_OPTS.length;i++)out+='<option'+(f.storage===STORAGE_OPTS[i]?' selected':'')+'>'+STORAGE_OPTS[i]+'</option>';
  out+='</select></div>';
  out+='<div class="fg"><div class="fl">\u23F3 Shelf Life</div><select class="fi" id="rcpShelf"><option value=""'+(f.shelf===''?' selected':'')+'>Select shelf life...</option>';
  for(var i=0;i<SHELF_OPTS.length;i++)out+='<option'+(f.shelf===SHELF_OPTS[i]?' selected':'')+'>'+SHELF_OPTS[i]+'</option>';
  out+='</select></div></div>';
  out+='<div class="fg" style="margin-top:8px"><div class="fl">\uD83D\uDCA1 Notes / Tips (optional)</div><textarea class="fi" id="rcpNotes" rows="2" placeholder="e.g. Use cold water in summer, do not over-mix..." style="resize:none">'+f.notes+'</textarea></div>';
  out+='</div></div>';

  out+=ingDL;
  out+='<button class="save-btn" id="saveRecipeBtn">\uD83D\uDCD6 Save Recipe Card</button>';
  return out;
}

/* ===== PRODUCTION TAB ===== */
function prodDayAgg(shop,daysBack){
  var t=new Date(today()),cutoff=new Date(t);cutoff.setDate(cutoff.getDate()-daysBack);
  var cutStr=toISO(cutoff);
  var map={};
  function addOrders(r){
    if(r.date<cutStr)return;
    if(shop!=='all'&&r.shop!=parseInt(shop))return;
    var orders=r.productOrders||[];
    if(!orders.length)return;
    if(!map[r.date])map[r.date]={date:r.date,totalQty:0,byCat:{Baking:0,'Oil Work':0,Sweets:0,'Cream Cakes':0},products:{},items:0};
    for(var j=0;j<orders.length;j++){
      var q=parseInt(orders[j].qty)||0;
      map[r.date].totalQty+=q;
      map[r.date].byCat[orders[j].category]=(map[r.date].byCat[orders[j].category]||0)+q;
      map[r.date].products[orders[j].product]=(map[r.date].products[orders[j].product]||0)+q;
      map[r.date].items++;
    }
  }
  for(var i=0;i<S.records.length;i++)addOrders(S.records[i]);
  for(var i=0;i<(S.prodOrderRecords||[]).length;i++)addOrders(S.prodOrderRecords[i]);
  var arr=[];for(var k in map)arr.push(map[k]);
  arr.sort(function(a,b){return a.date<b.date?-1:1});
  return arr;
}

function rmDayAgg(daysBack){
  var t=new Date(today()),cutoff=new Date(t);cutoff.setDate(cutoff.getDate()-daysBack);
  var cutStr=toISO(cutoff);var totalCost=0;var matMap={};
  for(var i=0;i<S.rawMatRecords.length;i++){
    var r=S.rawMatRecords[i];if(r.date<cutStr)continue;
    var mats=r.materials||[];
    for(var j=0;j<mats.length;j++){
      var amt=parseFloat(mats[j].amount)||0;
      totalCost+=amt;
      var n=mats[j].name||'Unknown';
      if(!matMap[n])matMap[n]={name:n,qty:0,cost:0,unit:mats[j].unit||''};
      matMap[n].qty+=(parseFloat(mats[j].qty)||0);
      matMap[n].cost+=amt;
    }
  }
  var arr=[];for(var k in matMap)arr.push(matMap[k]);
  arr.sort(function(a,b){return b.cost-a.cost});
  return{totalCost:totalCost,materials:arr};
}

function smaCalc(arr,key,n){if(!arr.length)return 0;if(arr.length<n)n=arr.length;var s=0;for(var i=arr.length-n;i<arr.length;i++)s+=arr[i][key];return n>0?s/n:0}
function wmaCalc(arr,key,n){if(!arr.length)return 0;if(arr.length<n)n=arr.length;var s=0,w=0;for(var i=arr.length-n;i<arr.length;i++){var wi=i-arr.length+n+1;s+=arr[i][key]*wi;w+=wi}return w>0?s/w:0}
function linRegCalc(arr,key){
  var n=arr.length;if(n<2)return{slope:0,intercept:0,r2:0};
  var sx=0,sy=0,sxy=0,sxx=0,syy=0;
  for(var i=0;i<n;i++){sx+=i;sy+=arr[i][key];sxy+=i*arr[i][key];sxx+=i*i;syy+=arr[i][key]*arr[i][key]}
  var denom=n*sxx-sx*sx;if(denom===0)return{slope:0,intercept:sy/n,r2:0};
  var slope=(n*sxy-sx*sy)/denom;
  var intercept=(sy-slope*sx)/n;
  var ssTot=syy-sy*sy/n;
  var ssRes=0;for(var i=0;i<n;i++){var pred=intercept+slope*i;ssRes+=(arr[i][key]-pred)*(arr[i][key]-pred)}
  var r2=ssTot>0?1-ssRes/ssTot:0;
  return{slope:slope,intercept:intercept,r2:Math.max(0,r2)};
}
function expSmoothCalc(arr,key,alpha){
  if(!arr.length)return{smoothed:[],forecast:0};
  if(!alpha)alpha=0.3;
  var s=[arr[0][key]];
  for(var i=1;i<arr.length;i++)s.push(alpha*arr[i][key]+(1-alpha)*s[i-1]);
  return{smoothed:s,forecast:alpha*arr[arr.length-1][key]+(1-alpha)*s[s.length-1]};
}
function forecastProd(arr,key,periods){
  if(arr.length<3)return[];
  var lr=linRegCalc(arr,key);
  var es=expSmoothCalc(arr,key,0.3);
  var base=es.forecast;
  var result=[];
  for(var i=1;i<=periods;i++){
    result.push(Math.max(0,Math.round(base+lr.slope*i)));
  }
  return result;
}

function renderProduction(){
  var shop=S.pShop,range=parseInt(S.pRange)||30;

  var rm=rmDayAgg(range);

  // Controls
  var out='<div class="prod-controls"><div class="biz-shop-toggle" style="margin-bottom:0;flex:1"><button class="biz-shop-btn'+(shop==='all'?' on':'')+'" data-pshop="all">All</button><button class="biz-shop-btn'+(shop==='0'?' on':'')+'" data-pshop="0">Highway</button><button class="biz-shop-btn'+(shop==='1'?' on':'')+'" data-pshop="1">Mainroad</button></div>';
  out+='<div class="prod-range"><button class="prod-range-btn'+(range===7?' on':'')+'" data-prange="7">7d</button><button class="prod-range-btn'+(range===14?' on':'')+'" data-prange="14">14d</button><button class="prod-range-btn'+(range===30?' on':'')+'" data-prange="30">30d</button><button class="prod-range-btn'+(range===90?' on':'')+'" data-prange="90">90d</button></div></div>';

  if(days.length<2){return out+'<div class="es"><div class="esi">\uD83C\uDFED</div><div class="est">Need at least 2 days of production data.<br>Production staff should enter daily orders.</div></div>'}

  var avgDaily=days.length>0?Math.round(totalQty/days.length):0;
  var activeProd=Object.keys(uniqueProds).length;
  // WoW comparison
  var half=Math.floor(days.length/2);
  var recent=days.slice(-half),older=days.slice(0,half);
  var recentQty=0,olderQty=0;
  for(var i=0;i<recent.length;i++)recentQty+=recent[i].totalQty;

  out+='<div class="prod-stat-grid">';

  out+=skC('\uD83D\uDCCA','Avg Daily',''+avgDaily+' units',growthStr,'#4a2c82','#f3e8ff');
  out+=skC('\uD83D\uDCCB','Active Products',''+activeProd,'unique items','#7c2d12','#fff7ed');
  out+=skC('\uD83E\uDDF1','RM Spend',fmt(rm.totalCost),rm.materials.length+' materials','#1e3a5f','#eff6ff');
  out+='</div>';

  // === TODAY'S PRODUCTION ===
  var todayData=null;
  for(var i=days.length-1;i>=0;i--){todayData=days[i];break;}
  if(todayData){
    var cats=['Baking','Oil Work','Sweets','Cream Cakes'];
    var catColors={'Baking':'var(--green)','Oil Work':'var(--amber)','Sweets':'var(--rose)','Cream Cakes':'var(--purple)'};
    out+='<div class="card prod-today"><div class="biz-section-title">\uD83D\uDCC5 Latest Production \u2022 '+fmtD(todayData.date)+'</div>';
    // Category proportion bar
    var catTotal=todayData.totalQty||1;
    out+='<div class="prod-cat-bar">';
    for(var c=0;c<cats.length;c++){var pct=(todayData.byCat[cats[c]]||0)/catTotal*100;if(pct>0)out+='<div style="width:'+pct+'%;background:'+catColors[cats[c]]+'"></div>'}
    out+='</div>';
    out+='<div class="prod-legend"><span style="--c:var(--green)">\u2022 Baking '+(todayData.byCat.Baking||0)+'</span><span style="--c:var(--amber)">\u2022 Oil Work '+(todayData.byCat['Oil Work']||0)+'</span><span style="--c:var(--rose)">\u2022 Sweets '+(todayData.byCat.Sweets||0)+'</span><span style="--c:var(--purple)">\u2022 Cream Cakes '+(todayData.byCat['Cream Cakes']||0)+'</span></div>';
    // Product list
    var prods=todayData.products;var prodArr=[];for(var k in prods)prodArr.push({name:k,qty:prods[k]});

  // === PRODUCTION TREND (7-day bar chart) ===

  var dt7=[];for(var i=0;i<last7.length;i++){dt7.push({l:new Date(last7[i].date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short'}),b:last7[i].totalQty})}
  if(dt7.length)out+=barCard('\uD83D\uDCC8','Production Volume','Last 7 days',dt7,'b','#1a6b4a');

  // === CATEGORY BREAKDOWN (stacked bars) ===
  if(last7.length>=3){
    var catCols={'Baking':'#1a6b4a','Oil Work':'#b8860b','Sweets':'#c0392b','Cream Cakes':'#6d28d9'};
    var mxCat=1;for(var i=0;i<last7.length;i++){if(last7[i].totalQty>mxCat)mxCat=last7[i].totalQty}

    out+='<div class="prod-legend"><span>\u2022 Baking</span><span>\u2022 Oil Work</span><span>\u2022 Sweets</span><span>\u2022 Cream Cakes</span></div>';
    out+='<div class="bc">';
    var bdCats=['Cream Cakes','Sweets','Oil Work','Baking'];
    for(var i=0;i<last7.length;i++){
      var dl=new Date(last7[i].date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short'});
      var tot=last7[i].totalQty||0;var hh=Math.max(tot/mxCat*100,4);
      out+='<div class="bcc"><div style="width:100%;display:flex;flex-direction:column;align-items:stretch;height:'+hh+'%">';
      var isFirst=true;
      for(var ci=0;ci<bdCats.length;ci++){var cv=last7[i].byCat[bdCats[ci]]||0;if(cv>0){var fh=tot>0?cv/tot*hh:0;out+='<div style="flex:'+fh+';background:'+catCols[bdCats[ci]]+';'+(isFirst?'border-radius:3px 3px 0 0;':'')+'min-height:2px"></div>';isFirst=false}}
      out+='</div><span class="blb">'+dl+'</span></div>';
    }
    out+='</div></div>';
  }

  // === TREND ANALYSIS (Moving Averages) ===
  out+='<div class="card"><div class="biz-section-title">\uD83D\uDCC8 Production Trends</div>';
  out+='<div style="font-size:11px;color:var(--text2);margin-bottom:8px">Moving averages \u2022 Period-over-period change</div>';
  var sma7=Math.round(smaCalc(days,'totalQty',7)),sma30=Math.round(smaCalc(days,'totalQty',30));
  var wma7=Math.round(wmaCalc(days,'totalQty',7));
  // WoW for production
  var last7d=days.slice(-7),prev7d=days.slice(-14,-7);
  var l7q=0,p7q=0;for(var i=0;i<last7d.length;i++)l7q+=last7d[i].totalQty;for(var i=0;i<prev7d.length;i++)p7q+=prev7d[i].totalQty;
  function trendBadgeProd(cur,prev){var p=prev>0?((cur-prev)/prev)*100:0;if(Math.abs(p)<2)return'<div class="biz-trend-badge flat">\u2014 Stable</div>';if(p>0)return'<div class="biz-trend-badge up">\u2191 +'+p.toFixed(1)+'%</div>';return'<div class="biz-trend-badge down">\u2193 '+p.toFixed(1)+'%</div>'}
  out+='<div class="biz-trend-row"><div class="biz-trend-label">SMA (7d) / day</div><div class="biz-trend-vals"><div class="biz-trend-val">'+sma7+'</div><div class="biz-trend-val" style="color:var(--text3);font-size:11px">'+sma30+'</div>'+trendBadgeProd(l7q,p7q)+'</div></div>';
  out+='<div class="biz-trend-row"><div class="biz-trend-label">WMA (7d) / day</div><div class="biz-trend-vals"><div class="biz-trend-val">'+wma7+'</div></div></div>';
  // Per-category trends
  var cats2=['Baking','Oil Work','Sweets','Cream Cakes'];var catIcons=['\uD83C\uDF5E','\uD83C\uDF69','\uD83C\uDF6C','\uD83C\uDF82'];
  for(var c=0;c<cats2.length;c++){
    var catDays=[];for(var i=0;i<days.length;i++)catDays.push({v:days[i].byCat[cats2[c]]||0});
    var csma=Math.round(smaCalc(catDays,'v',7));
    out+='<div class="biz-trend-row"><div class="biz-trend-label">'+catIcons[c]+' '+cats2[c]+'</div><div class="biz-trend-vals"><div class="biz-trend-val">'+csma+'/d</div></div></div>';
  }
  // Golden/death cross
  if(days.length>=14){
    if(sma7>sma30&&sma7>sma30*1.05)out+='<div style="margin-top:8px;padding:8px 12px;background:var(--gl);border-radius:8px;font-size:11px;font-weight:600;color:var(--green)">\u2705 Golden Signal: 7-day production above 30-day average. Output increasing.</div>';
    else if(sma7<sma30&&sma7<sma30*.95)out+='<div style="margin-top:8px;padding:8px 12px;background:var(--rl);border-radius:8px;font-size:11px;font-weight:600;color:var(--rose)">\u26A0\uFE0F Warning: 7-day production dropped below 30-day average. Review demand.</div>';
  }
  out+='</div>';

  // === DEMAND FORECAST ===
  if(days.length>=5){
    var fc=forecastProd(days,'totalQty',7);
    var lr=linRegCalc(days,'totalQty');
    var r2=lr.r2;
    var confLabel=r2>=0.7?'High':r2>=0.4?'Medium':'Low';
    var confColor=r2>=0.7?'var(--green)':r2>=0.4?'var(--amber)':'var(--rose)';
    var confBg=r2>=0.7?'var(--gl)':r2>=0.4?'var(--al)':'var(--rl)';
    var avgFc=fc.length>0?Math.round(fc.reduce(function(a,b){return a+b},0)/fc.length):0;
    var fcChange=avgDaily>0?((avgFc-avgDaily)/avgDaily*100):0;

    out+='<div class="prod-forecast-card"><div class="prod-forecast-title">\uD83D\uDD2E Demand Forecast (Next 7 Days)</div>';
    out+='<div class="prod-forecast-sub">Predicted avg: <strong>'+avgFc+' units/day</strong> ('+(fcChange>=0?'+':'')+fcChange.toFixed(1)+'% vs current)</div>';

    // Bar chart: last 7 actual + 7 predicted
    var allBars=[];
    var actLast=days.slice(-7);
    for(var i=0;i<actLast.length;i++){allBars.push({v:actLast[i].totalQty,type:'actual',l:new Date(actLast[i].date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'narrow'})})}
    var td=new Date(today());
    for(var i=0;i<fc.length;i++){var fd=new Date(td);fd.setDate(fd.getDate()+i+1);allBars.push({v:fc[i],type:'predicted',l:fd.toLocaleDateString('en-IN',{weekday:'narrow'})})}
    var mxF=1;for(var i=0;i<allBars.length;i++){if(allBars[i].v>mxF)mxF=allBars[i].v}

      var hh=Math.max(allBars[i].v/mxF*100,3);

      out+='<div class="bcc" style="flex:1"><div class="'+cls+'" style="width:100%;height:'+hh+'%;'+bg+'"></div><span class="blb">'+allBars[i].l+'</span></div>';
    }
    out+='</div>';
    out+='<div class="prod-forecast-lbl"><span>\u2190 Actual</span><span>Forecast \u2192</span></div>';
    out+='<div class="prod-confidence" style="background:'+confBg+';color:'+confColor+'">R\u00B2 = '+r2.toFixed(2)+' \u2022 '+confLabel+' confidence</div>';
    out+='</div>';
  }

  // === DAY-OF-WEEK PATTERN ===
  if(days.length>=7){
    var dowData=[0,0,0,0,0,0,0],dowCount=[0,0,0,0,0,0,0];
    var dowNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    for(var i=0;i<days.length;i++){var dw=new Date(days[i].date+'T00:00:00').getDay();dowData[dw]+=days[i].totalQty;dowCount[dw]++}
    var dowAvg=[];var bestDay=0,worstDay=0,bestVal=0,worstVal=Infinity;

    var mxDow=bestVal||1;

    out+='<div style="font-size:11px;color:var(--text2);margin-bottom:8px">Peak: <strong>'+dowNames[bestDay]+'</strong> ('+bestVal+' avg) \u2022 Low: <strong>'+dowNames[worstDay]+'</strong> ('+worstVal+' avg)</div>';
    out+='<div class="biz-dow">';
    for(var i=0;i<7;i++){var bg=i===bestDay?'var(--gl)':i===worstDay?'var(--rl)':'var(--bg)';var col=i===bestDay?'var(--green)':i===worstDay?'var(--rose)':'var(--text)';out+='<div class="biz-dow-item" style="background:'+bg+'"><div class="biz-dow-day">'+dowNames[i]+'</div><div class="biz-dow-val" style="color:'+col+'">'+dowAvg[i]+'</div></div>'}
    out+='</div></div>';
  }

  // === TOP PRODUCTS (PARETO) ===
  var prodMap={};
  for(var i=0;i<days.length;i++){var p=days[i].products;for(var k in p)prodMap[k]=(prodMap[k]||0)+p[k]}

    out+='</div>';
  }

  // === PRODUCTION vs SALES CORRELATION ===
  var salesDays=aDayAgg(aRecs(shop==='all'?shop:parseInt(shop)));
  if(salesDays.length>=7&&days.length>=7){
    var sl7=salesDays.slice(-7),sp7=salesDays.slice(-14,-7);
    var slBill=0,spBill=0;for(var i=0;i<sl7.length;i++)slBill+=sl7[i].billed;for(var i=0;i<sp7.length;i++)spBill+=sp7[i].billed;
    var salesGrowth=spBill>0?((slBill-spBill)/spBill*100):0;

    if(mismatch){

    }else{

    }

  // === RECOMMENDATIONS ===
  var recs=[];

  // RM cost check
  if(rm.totalCost>0&&totalQty>0){
    var costPerUnit=rm.totalCost/totalQty;
    if(costPerUnit>50)recs.push({p:'medium',i:'\uD83E\uDDF1',m:'Raw material cost is <strong>'+fmt(Math.round(costPerUnit))+'/unit</strong>. Review supplier pricing for bulk discounts.'});
  }
  // Day-of-week suggestion
  if(days.length>=14&&typeof worstVal!=='undefined'&&typeof bestVal!=='undefined'&&worstVal<bestVal*0.4){
    recs.push({p:'medium',i:'\uD83D\uDCC5',m:'Production on the weakest day is under 40% of your peak. Consider adjusting staffing or prep schedules.'});
  }
  // Positive
  if(days.length>=14&&l7q>p7q*1.1)recs.push({p:'good',i:'\uD83D\uDE80',m:'Production is <strong>growing</strong>. Great momentum \u2014 ensure raw material supply keeps up.'});
  if(rm.materials.length>=5)recs.push({p:'good',i:'\u2705',m:'Tracking <strong>'+rm.materials.length+' raw materials</strong>. Good supply chain visibility.'});

  if(recs.length){
    out+='<div class="card"><div class="biz-section-title">\uD83D\uDCA1 Production Insights</div>';
    for(var i=0;i<recs.length&&i<6;i++){out+='<div class="biz-rec '+recs[i].p+'"><div class="biz-rec-icon">'+recs[i].i+'</div><div class="biz-rec-text">'+recs[i].m+'</div></div>'}
    out+='</div>';
  }

  // Method credit
  out+='<div style="text-align:center;padding:16px;font-size:10px;color:var(--text3);line-height:1.6">Analysis: SMA \u2022 WMA \u2022 Linear Regression \u2022 Exponential Smoothing<br>Pareto 80/20 \u2022 Day-of-Week Analysis \u2022 Production-Sales Correlation</div>';
  return out;
}


/* ===== ANALYTICS TAB ===== */
function aRecs(shop){var a=[];for(var i=0;i<S.records.length;i++){if(shop==='all'||S.records[i].shop==shop)a.push(S.records[i])}return a}
function aRecsRange(recs,from,to){var a=[];for(var i=0;i<recs.length;i++){if(recs[i].date>=from&&recs[i].date<=to)a.push(recs[i])}return a}
function aRecsByDate(recs,d){var a=[];for(var i=0;i<recs.length;i++){if(recs[i].date===d)a.push(recs[i])}return a}
function aDayAgg(recs){var map={};for(var i=0;i<recs.length;i++){var d=recs[i].date;if(!map[d])map[d]={date:d,billed:0,upi:0,walk:0,exp:0,ven:0,open:0,close:0};map[d].billed+=recs[i].totalBilled||0;map[d].upi+=recs[i].upiReceived||0;map[d].walk+=recs[i].walkIns||0;map[d].exp+=recs[i].totalExpenses||0;map[d].ven+=recs[i].totalVendorPayments||0;map[d].open+=recs[i].openingTotal||0;map[d].close+=recs[i].closingTotal||0}var arr=[];for(var k in map)arr.push(map[k]);arr.sort(function(a,b){return a.date<b.date?-1:1});return arr}

function calcHealthScore(days){
  if(days.length<3)return null;
  var last7=days.slice(-7),prev7=days.slice(-14,-7);
  // 1. Profitability (0-20)
  var tBill=0,tCost=0;for(var i=0;i<last7.length;i++){tBill+=last7[i].billed;tCost+=last7[i].exp}
  var margin=tBill>0?(tBill-tCost)/tBill:0;
  var profitScore=margin>=.20?20:margin>=.15?16:margin>=.10?12:margin>=.05?8:margin>=0?4:0;
  // 2. Revenue Trend (0-20)
  var cur7=0,prv7=0;for(var i=0;i<last7.length;i++)cur7+=last7[i].billed;for(var i=0;i<prev7.length;i++)prv7+=prev7[i].billed;
  var revGrowth=prv7>0?((cur7-prv7)/prv7)*100:0;
  var revScore=revGrowth>10?20:revGrowth>5?16:revGrowth>-5?12:revGrowth>-10?6:0;
  // 3. Cash Flow Health (0-20)
  var totalDisc=0,totalBillCash=0;
  for(var i=0;i<last7.length;i++){var cashIn=last7[i].billed-last7[i].upi;var expected=last7[i].open+cashIn-last7[i].exp;var disc=Math.abs(last7[i].close-expected);totalDisc+=disc;totalBillCash+=last7[i].billed}
  var discPct=totalBillCash>0?totalDisc/totalBillCash:0;
  var cashScore=discPct<.01?20:discPct<.02?15:discPct<.05?10:discPct<.10?5:0;
  // 4. Expense Control (0-20)
  var cur7Ratio=cur7>0?tCost/cur7:1;
  var all30Cost=0,all30Bill=0;for(var i=0;i<days.length;i++){all30Cost+=days[i].exp;all30Bill+=days[i].billed}
  var avg30Ratio=all30Bill>0?all30Cost/all30Bill:1;
  var expDiff=avg30Ratio>0?((cur7Ratio-avg30Ratio)/avg30Ratio)*100:0;
  var expScore=expDiff<-5?20:Math.abs(expDiff)<=5?14:expDiff<=15?8:0;
  // 5. Customer Traffic (0-20)
  var curWalk=0,prvWalk=0;for(var i=0;i<last7.length;i++)curWalk+=last7[i].walk;for(var i=0;i<prev7.length;i++)prvWalk+=prev7[i].walk;
  var walkGrowth=prvWalk>0?((curWalk-prvWalk)/prvWalk)*100:0;
  var walkScore=walkGrowth>10?20:walkGrowth>5?16:walkGrowth>-5?12:walkGrowth>-10?6:0;
  var total=profitScore+revScore+cashScore+expScore+walkScore;
  return{total:total,profit:{score:profitScore,margin:margin},revenue:{score:revScore,growth:revGrowth},cash:{score:cashScore,disc:discPct},expense:{score:expScore,diff:expDiff},traffic:{score:walkScore,growth:walkGrowth}};
}

// ═══ EXECUTIVE REPORT GENERATOR ═══
function getExecDateRange(period){
  var t=new Date(),y=t.getFullYear(),m=t.getMonth(),d=t.getDate();
  var from,to,compFrom,compTo,label;
  if(period==='thisWeek'){
    var dow=t.getDay()||7;from=toISO(new Date(y,m,d-dow+1));to=today();
    var pEnd=new Date(y,m,d-dow);var pStart=new Date(pEnd.getFullYear(),pEnd.getMonth(),pEnd.getDate()-6);
    compFrom=toISO(pStart);compTo=toISO(pEnd);label='This Week';
  }else if(period==='thisMonth'){
    from=y+'-'+String(m+1).padStart(2,'0')+'-01';to=today();
    var pm=m===0?11:m-1,py=m===0?y-1:y;
    compFrom=py+'-'+String(pm+1).padStart(2,'0')+'-01';
    var pmEnd=new Date(py,pm+1,0);compTo=toISO(pmEnd);label='This Month';
  }else if(period==='lastMonth'){
    var pm=m===0?11:m-1,py=m===0?y-1:y;
    from=py+'-'+String(pm+1).padStart(2,'0')+'-01';to=toISO(new Date(py,pm+1,0));
    var pp=pm===0?11:pm-1,ppy=pm===0?py-1:py;
    compFrom=ppy+'-'+String(pp+1).padStart(2,'0')+'-01';compTo=toISO(new Date(ppy,pp+1,0));
    label='Last Month';
  }else{
    from=S.execRptFrom||today();to=S.execRptTo||today();
    var days=Math.round((new Date(to)-new Date(from))/(86400000))+1;
    var cEnd=new Date(new Date(from).getTime()-86400000);
    var cStart=new Date(cEnd.getTime()-(days-1)*86400000);
    compFrom=toISO(cStart);compTo=toISO(cEnd);label=fmtD(from)+' - '+fmtD(to);
  }
  return{from:from,to:to,compFrom:compFrom,compTo:compTo,label:label};
}

  grnRecs.forEach(function(r){(r.goodsInward||[]).forEach(function(g){var n=g.vendor||'Unknown';if(!venMap[n])venMap[n]={paid:0,goods:0};venMap[n].goods+=Number(g.amount)||0})});

  var genDate=new Date().toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'});

  var html='<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">';

    var mxDow=bestVal||1;

    out+='<div style="font-size:11px;color:var(--text2);margin-bottom:8px">Best day: <strong>'+dowNames[bestDay]+'</strong> ('+fmt(bestVal)+') \u2022 Weakest: <strong>'+dowNames[worstDay]+'</strong> ('+fmt(worstVal)+')</div>';
    out+='<div class="biz-dow">';
    for(var i=0;i<7;i++){var bg=i===bestDay?'var(--gl)':i===worstDay?'var(--rl)':'var(--bg)';var col=i===bestDay?'var(--green)':i===worstDay?'var(--rose)':'var(--text)';out+='<div class="biz-dow-item" style="background:'+bg+'"><div class="biz-dow-day">'+dowNames[i]+'</div><div class="biz-dow-val" style="color:'+col+'">'+fmt(dowAvg[i])+'</div></div>'}
    out+='</div></div>';
  }

  // === CASH FLOW HEALTH ===
  out+='<div class="card"><div class="biz-section-title">\uD83D\uDCB5 Cash Flow Health</div>';
  var last7d2=days.slice(-7);
  var totBill7=0,totUpi7=0,totExp7=0,totVen7=0,totClose7=0;
  for(var i=0;i<last7d2.length;i++){totBill7+=last7d2[i].billed;totUpi7+=last7d2[i].upi;totExp7+=last7d2[i].exp;totVen7+=last7d2[i].ven;totClose7+=last7d2[i].close}
  var upiPct=totBill7>0?Math.round(totUpi7/totBill7*100):0;
  var cashDep=100-upiPct;
  var netCF=totBill7-totExp7;
  var opMargin=totBill7>0?Math.round((totBill7-totExp7)/totBill7*100):0;
  out+='<div class="biz-cf-grid"><div class="biz-cf-box"><div class="biz-cf-lbl">Net Cash Flow (7d)</div><div class="biz-cf-val" style="color:'+(netCF>=0?'var(--green)':'var(--rose)')+'">'+fmt(netCF)+'</div></div>';
  out+='<div class="biz-cf-box"><div class="biz-cf-lbl">Operating Margin</div><div class="biz-cf-val" style="color:'+(opMargin>=10?'var(--green)':'var(--rose)')+'">'+opMargin+'%</div></div>';
  out+='<div class="biz-cf-box"><div class="biz-cf-lbl">UPI Adoption</div><div class="biz-cf-val" style="color:var(--blue)">'+upiPct+'%</div><div class="biz-cf-sub">'+(upiPct>=50?'Good digital mix':'Encourage UPI')+'</div></div>';
  out+='<div class="biz-cf-box"><div class="biz-cf-lbl">Cash Dependency</div><div class="biz-cf-val" style="color:'+(cashDep>70?'var(--amber)':'var(--green)')+'">'+cashDep+'%</div><div class="biz-cf-sub">'+(cashDep>70?'High risk':'Balanced')+'</div></div></div></div>';

  // === SHOP COMPARISON ===
  if(shop==='all'){
    var s0=aDayAgg(aRecs(0)),s1=aDayAgg(aRecs(1));
    if(s0.length>=3&&s1.length>=3){
      var s0bill=0,s1bill=0,s0walk=0,s1walk=0,s0exp=0,s1exp=0;
      var s0last=s0.slice(-7),s1last=s1.slice(-7);
      for(var i=0;i<s0last.length;i++){s0bill+=s0last[i].billed;s0walk+=s0last[i].walk;s0exp+=s0last[i].exp}
      for(var i=0;i<s1last.length;i++){s1bill+=s1last[i].billed;s1walk+=s1last[i].walk;s1exp+=s1last[i].exp}
      var better=s0bill>=s1bill?'Highway':'Mainroad';var diff=Math.abs(s0bill-s1bill);
      out+='<div class="card"><div class="biz-section-title">\uD83C\uDFEA Shop Comparison (Last 7 Days)</div>';
      out+='<div class="biz-cf-grid"><div class="biz-cf-box" style="border:2px solid var(--green)"><div class="biz-cf-lbl">Highway Revenue</div><div class="biz-cf-val">'+fmt(s0bill)+'</div><div class="biz-cf-sub">Walk-ins: '+s0walk+'</div></div>';
      out+='<div class="biz-cf-box" style="border:2px solid var(--blue)"><div class="biz-cf-lbl">Mainroad Revenue</div><div class="biz-cf-val">'+fmt(s1bill)+'</div><div class="biz-cf-sub">Walk-ins: '+s1walk+'</div></div></div>';
      out+='<div style="text-align:center;font-size:12px;color:var(--text2);margin-top:8px"><strong>'+better+'</strong> leads by '+fmt(diff)+' this week</div></div>';
    }
  }

  // === ACTIONABLE RECOMMENDATIONS ===
  var recs=[];
  // Critical: negative margin
  if(hs.profit.margin<0)recs.push({p:'critical',i:'\uD83D\uDEA8',m:'Business is <strong>losing money</strong>. Revenue does not cover expenses. Review all cost categories immediately.'});
  // Critical: cash discrepancy
  if(hs.cash.disc>.05)recs.push({p:'critical',i:'\uD83D\uDCB8',m:'<strong>Cash discrepancy above 5%.</strong> Possible leakage of '+fmt(Math.round(hs.cash.disc*l7bill))+' over 7 days. Audit cash handling process.'});
  // High: revenue declining
  if(hs.revenue.growth<-10)recs.push({p:'high',i:'\uD83D\uDCC9',m:'Revenue is <strong>down '+Math.abs(hs.revenue.growth).toFixed(1)+'%</strong> week-over-week. Consider promotions, new products, or marketing push.'});
  // High: break-even not met
  if(last7d.length>0){var beCount=0;for(var i=0;i<last7d.length;i++){if(last7d[i].billed<breakEven)beCount++}if(beCount>=5)recs.push({p:'high',i:'\u26A0\uFE0F',m:'Below break-even <strong>'+beCount+' of last 7 days</strong>. Daily shortfall averaging '+fmt(Math.round((breakEven*last7d.length-l7bill)/last7d.length))+'. Urgently review pricing or costs.'})}
  // High: single expense >40%
  if(catArr.length&&catTotal>0&&catArr[0].amt/catTotal>.4)recs.push({p:'high',i:'\uD83D\uDCCA',m:'<strong>'+catArr[0].cat+'</strong> is '+Math.round(catArr[0].amt/catTotal*100)+'% of all expenses. Negotiate better rates or find alternatives.'});
  // Medium: walk-ins down but ticket up
  if(hs.traffic.growth<-10&&ticket7>0){var prevTicket=p7walk>0?Math.round(p7bill/p7walk):0;if(prevTicket>0&&ticket7>prevTicket*1.1)recs.push({p:'medium',i:'\uD83D\uDEB6',m:'Fewer customers but <strong>higher spending per visit</strong>. Short-term OK, but customer retention may be at risk. Consider loyalty offers.'})}
  // Medium: walk-ins up but revenue flat
  if(hs.traffic.growth>10&&Math.abs(hs.revenue.growth)<5)recs.push({p:'medium',i:'\uD83E\uDD14',m:'Walk-ins are <strong>up '+hs.traffic.growth.toFixed(1)+'%</strong> but revenue is flat. Check if discounting is too aggressive or avg ticket is dropping.'});
  // Medium: UPI low
  if(upiPct<30&&totBill7>0)recs.push({p:'medium',i:'\uD83D\uDCF1',m:'Only <strong>'+upiPct+'% digital payments</strong>. Encouraging UPI reduces cash handling errors and theft risk. Display QR codes prominently.'});
  // Good: positive trends
  if(hs.revenue.growth>10)recs.push({p:'good',i:'\uD83D\uDE80',m:'Revenue is <strong>up '+hs.revenue.growth.toFixed(1)+'%</strong> this week. Great momentum \u2014 keep doing what works!'});
  if(hs.profit.margin>.15)recs.push({p:'good',i:'\u2B50',m:'Healthy profit margin of <strong>'+Math.round(hs.profit.margin*100)+'%</strong>. Business is in a strong position.'});
  // Day-of-week suggestion
  if(days.length>=14&&worstVal<bestVal*.5)recs.push({p:'medium',i:'\uD83D\uDCC5',m:'<strong>'+dowNames[worstDay]+'</strong> averages '+Math.round(worstVal/bestVal*100)+'% of your best day. Consider promotions or reduced staffing on slow days.'});

  if(recs.length){
    out+='<div class="card"><div class="biz-section-title">\uD83D\uDCA1 Recommendations</div>';
    out+='<div style="font-size:11px;color:var(--text2);margin-bottom:10px">Data-driven actions based on your business patterns</div>';
    for(var i=0;i<recs.length&&i<8;i++){out+='<div class="biz-rec '+recs[i].p+'"><div class="biz-rec-icon">'+recs[i].i+'</div><div class="biz-rec-text">'+recs[i].m+'</div></div>'}
    out+='</div>';
  }

  // Method credit
  out+='<div style="text-align:center;padding:16px;font-size:10px;color:var(--text3);line-height:1.6">Analysis methods: Composite KPI Scoring \u2022 Pareto 80/20 Rule<br>Break-Even Analysis \u2022 Simple Moving Averages \u2022 Cash Flow Reconciliation</div>';
  return out;
}

  // Add item to customer order
  var addAdvItem=document.getElementById('addAdvItem');if(addAdvItem)addAdvItem.onclick=function(){
    var prod=document.getElementById('advProdInp'),qty=document.getElementById('advQtyInp'),unit=document.getElementById('advUnitInp'),cat=document.getElementById('advCatInp'),itemNotes=document.getElementById('advItemNotes');
    if(!prod||!prod.value){toast('\u274C Enter product name');return}
    var q=parseInt(qty?qty.value:0)||0;if(!q){toast('\u274C Enter quantity');return}
    S.advItems.push({product:prod.value,qty:q,unit:unit?unit.value:'pcs',category:cat?cat.value:'Baking',notes:itemNotes?itemNotes.value:''});
    addProductName(prod.value);S.advProd='';S.advQty='';render()
  };
  document.querySelectorAll('[data-deladvitem]').forEach(function(b){b.onclick=function(){S.advItems.splice(parseInt(b.dataset.deladvitem),1);render()}});
  // Save all items as customer orders
  var saveAdvOrder=document.getElementById('saveAdvOrder');if(saveAdvOrder)saveAdvOrder.onclick=function(){
    var cust=document.getElementById('advCustInp'),notes=document.getElementById('advNotesInp'),dt=document.getElementById('advDateInp'),shop=document.getElementById('advShopInp');
    if(!cust||!cust.value){toast('\u274C Enter customer name');return}
    if(!S.advItems.length){toast('\u274C Add at least one item');return}
    if(S.saving)return;S.saving=true;saveAdvOrder.textContent='\u23F3 Saving...';
    var custName=cust.value,delDate=dt?dt.value:S.advDate,shopVal=shop?parseInt(shop.value):S.advShop,orderNotes=notes?notes.value:'';
    var saves=[];
    for(var i=0;i<S.advItems.length;i++){var itm=S.advItems[i];
      var entry={type:'advanceOrder',id:gid(),customer:custName,deliveryDate:delDate,shop:shopVal,product:itm.product,qty:itm.qty,unit:itm.unit,category:itm.category,notes:(itm.notes?itm.notes:'')+(orderNotes?' \u2022 '+orderNotes:''),savedAt:new Date().toISOString(),savedBy:'ordering'};
      saves.push(callApi('save',{},entry))}
    Promise.all(saves).then(function(){toast('\u2705 '+S.advItems.length+' item'+(S.advItems.length>1?'s':'')+' saved!');S.advCust='';S.advProd='';S.advQty='';S.advNotes='';S.advItems=[];return doFetch()}).catch(function(e){toast('\u274C '+e.message)}).then(function(){S.saving=false;render()})
  };
  document.querySelectorAll('[data-deladvorder]').forEach(function(b){b.onclick=function(){if(!confirm('Delete this customer order?'))return;var id=b.dataset.deladvorder;callApi('delete',{id:id}).then(function(){toast('Deleted');doFetch()}).catch(function(e){toast('\u274C '+e.message)})}});
  // Edit customer order
  document.querySelectorAll('[data-editadvorder]').forEach(function(b){b.onclick=function(){
    var id=b.dataset.editadvorder;var order=null;for(var i=0;i<S.advOrders.length;i++){if(S.advOrders[i].id===id){order=S.advOrders[i];break}}if(!order)return;
    var ov=document.createElement('div');ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
    var md='<div style="background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:360px"><div style="font-weight:700;font-size:16px;margin-bottom:12px">\u270E Edit Customer Order</div>';
    md+='<div class="fg"><div class="fl">Customer</div><input class="fi" type="text" id="eaCust" value="'+(order.customer||'').replace(/"/g,'&quot;')+'"></div>';
    md+='<div class="fr c2" style="margin-top:8px"><div class="fg"><div class="fl">Product</div><input class="fi" type="text" id="eaProd" value="'+(order.product||'').replace(/"/g,'&quot;')+'"></div><div class="fg"><div class="fl">Delivery Date</div><input class="fi" type="date" id="eaDate" value="'+(order.deliveryDate||'')+'"></div></div>';
    md+='<div class="fr c3" style="margin-top:8px"><div class="fg"><div class="fl">Qty</div><input class="fi" type="number" inputmode="numeric" id="eaQty" value="'+(order.qty||0)+'"></div><div class="fg"><div class="fl">Unit</div><select class="fi" id="eaUnit">'+PUNITS.map(function(u){return'<option'+(u===order.unit?' selected':'')+'>'+u+'</option>'}).join('')+'</select></div><div class="fg"><div class="fl">Shop</div><select class="fi" id="eaShop"><option value="0"'+(order.shop==0?' selected':'')+'>Highway</option><option value="1"'+(order.shop==1?' selected':'')+'>Mainroad</option></select></div></div>';
    md+='<div class="fg" style="margin-top:8px"><div class="fl">Notes</div><input class="fi" type="text" id="eaNotes" value="'+(order.notes||'').replace(/"/g,'&quot;')+'"></div>';
    md+='<div style="display:flex;gap:8px;margin-top:14px"><button class="save-btn" id="eaSave" style="flex:1">Save</button><button class="save-btn" id="eaCancel" style="flex:1;background:var(--bg);color:var(--text2)">Cancel</button></div></div>';
    ov.innerHTML=md;document.body.appendChild(ov);
    document.getElementById('eaCancel').onclick=function(){ov.remove()};
    document.getElementById('eaSave').onclick=function(){
      var updated={type:'advanceOrder',id:order.id,customer:document.getElementById('eaCust').value,product:document.getElementById('eaProd').value,deliveryDate:document.getElementById('eaDate').value,qty:parseInt(document.getElementById('eaQty').value)||0,unit:document.getElementById('eaUnit').value,shop:parseInt(document.getElementById('eaShop').value),notes:document.getElementById('eaNotes').value,category:order.category||'Baking',savedAt:new Date().toISOString(),savedBy:'ordering'};
      if(!updated.customer||!updated.product||!updated.qty){toast('\u274C Fill all required fields');return}
      ov.remove();callApi('save',{},updated).then(function(){toast('\u2705 Order updated');doFetch()}).catch(function(e){toast('\u274C '+e.message)})
    };
  }});
  // Add customer order to production order
  document.querySelectorAll('[data-addadvtoorder]').forEach(function(b){b.onclick=function(){
    var advForDay=getAdvOrdersForDate(S.date,S.ordShop);var idx=parseInt(b.dataset.addadvtoorder);var a=advForDay[idx];if(!a)return;
    S.ordItems.push({id:gid(),advOrderId:a.id,product:a.product,category:a.category||'Baking',qty:a.qty,unit:a.unit,notes:'\uD83D\uDC64 '+a.customer+(a.notes?' \u2022 '+a.notes:'')});
    addProductName(a.product);render();
  }});

  // Production orders date
  var podInp=document.getElementById('prodOrderDate');if(podInp)podInp.onchange=function(e){S.orderDate=e.target.value;render()};

  // Raw materials
  var rmDateInp=document.getElementById('rmDateInp');if(rmDateInp)rmDateInp.onchange=function(e){S.orderDate=e.target.value;S.rawMats=[];render()};
  var addRMBtn=document.getElementById('addRM');if(addRMBtn)addRMBtn.onclick=function(){var n=document.getElementById('rmName'),q=document.getElementById('rmQty'),u=document.getElementById('rmUnit'),v=document.getElementById('rmVendor'),c=document.getElementById('rmCost');var qty=parseFloat(q.value)||0;if(!qty||!n.value)return;S.rawMats.push({id:gid(),name:n.value,qty:qty,unit:u.value,vendor:v.value,amount:parseInt(c.value)||0});addRawMatName(n.value);render()};
  document.querySelectorAll('[data-delrm]').forEach(function(b){b.onclick=function(){S.rawMats.splice(parseInt(b.dataset.delrm),1);render()}});
  var saveRMBtn=document.getElementById('saveRMBtn');if(saveRMBtn)saveRMBtn.onclick=function(){
    if(S.saving)return;S.saving=true;saveRMBtn.textContent='\u23F3 Saving...';saveRMBtn.className='save-btn off';
    var entry={type:'rawMaterial',id:gid(),date:S.orderDate,materials:JSON.parse(JSON.stringify(S.rawMats)),savedAt:new Date().toISOString(),savedBy:'production'};
    callApi('save',{},entry).then(function(){toast('\u2705 Raw material order saved!');return doFetch()}).catch(function(e){toast('\u274C '+e.message)}).then(function(){S.saving=false;var b=document.getElementById('saveRMBtn');if(b){b.textContent='\uD83D\uDCBE Save Raw Material Order';b.className='save-btn'}})
  };

  // Recipe book
  var addRcpBtn=document.getElementById('addRecipeBtn');if(addRcpBtn)addRcpBtn.onclick=function(){S.rcpAdding=true;resetRcpForm();render()};
  var rcpBack=document.getElementById('rcpBackBtn');if(rcpBack)rcpBack.onclick=function(){S.rcpAdding=false;S.rcpView=-1;render()};
  document.querySelectorAll('[data-viewrcp]').forEach(function(b){b.onclick=function(){S.rcpView=parseInt(b.dataset.viewrcp);render()}});
  document.querySelectorAll('[data-delrcp]').forEach(function(b){b.onclick=function(){if(!confirm('Delete this recipe?'))return;var r=S.recipes[parseInt(b.dataset.delrcp)];if(r&&r.id)callApi('delete',{id:r.id}).then(function(){toast('Recipe deleted');S.rcpView=-1;doFetch()}).catch(function(e){toast('\u274C '+e.message)})}});

  // Recipe form fields
  var rcpName=document.getElementById('rcpName');if(rcpName)rcpName.oninput=function(e){S.rcpForm.name=e.target.value};
  var rcpCat=document.getElementById('rcpCat');if(rcpCat)rcpCat.onchange=function(e){S.rcpForm.cat=e.target.value;render()};
  var rcpYield=document.getElementById('rcpYield');if(rcpYield)rcpYield.oninput=function(e){S.rcpForm.yield=e.target.value};
  var rcpYieldUnit=document.getElementById('rcpYieldUnit');if(rcpYieldUnit)rcpYieldUnit.onchange=function(e){S.rcpForm.yieldUnit=e.target.value};
  var rcpPrep=document.getElementById('rcpPrep');if(rcpPrep)rcpPrep.oninput=function(e){S.rcpForm.prep=e.target.value};
  var rcpBake=document.getElementById('rcpBake');if(rcpBake)rcpBake.oninput=function(e){S.rcpForm.bake=e.target.value};
  var rcpTemp=document.getElementById('rcpTemp');if(rcpTemp)rcpTemp.oninput=function(e){S.rcpForm.temp=e.target.value};
  var rcpNotes=document.getElementById('rcpNotes');if(rcpNotes)rcpNotes.oninput=function(e){S.rcpForm.notes=e.target.value};
  var rcpStorage=document.getElementById('rcpStorage');if(rcpStorage)rcpStorage.onchange=function(e){S.rcpForm.storage=e.target.value};
  var rcpShelf=document.getElementById('rcpShelf');if(rcpShelf)rcpShelf.onchange=function(e){S.rcpForm.shelf=e.target.value};

  // Method step template chips — tap to add
  document.querySelectorAll('[data-addstep]').forEach(function(chip){chip.onclick=function(){
    var catSteps=METHOD_STEPS[S.rcpForm.cat]||METHOD_STEPS['Baking'];
    var stepText=catSteps[parseInt(chip.dataset.addstep)]||'';
    // Replace first empty step, or add new one
    var added=false;
    for(var i=0;i<S.rcpForm.steps.length;i++){if(!S.rcpForm.steps[i].trim()){S.rcpForm.steps[i]=stepText;added=true;break}}
    if(!added)S.rcpForm.steps.push(stepText);
    render();
  }});

  // (rcpCat onchange already set above with render)

  // Recipe ingredient rows
  document.querySelectorAll('[data-rcping-name]').forEach(function(inp){inp.oninput=function(e){S.rcpForm.ings[parseInt(inp.dataset.rcpingName)].name=e.target.value};acInput(null,BAKING_INGS,inp)});
  document.querySelectorAll('[data-rcping-qty]').forEach(function(inp){inp.oninput=function(e){S.rcpForm.ings[parseInt(inp.dataset.rcpingQty)].qty=e.target.value;render()}});
  document.querySelectorAll('[data-rcping-unit]').forEach(function(inp){inp.onchange=function(e){S.rcpForm.ings[parseInt(inp.dataset.rcpingUnit)].unit=e.target.value}});
  document.querySelectorAll('[data-rcping-flour]').forEach(function(inp){inp.onchange=function(e){S.rcpForm.ings[parseInt(inp.dataset.rcpingFlour)].isFlour=e.target.checked;render()}});
  document.querySelectorAll('[data-rcping-del]').forEach(function(b){b.onclick=function(){S.rcpForm.ings.splice(parseInt(b.dataset.rcpingDel),1);if(!S.rcpForm.ings.length)S.rcpForm.ings.push({name:'',qty:'',unit:'g',isFlour:true});render()}});
  var addRcpIng=document.getElementById('addRcpIng');if(addRcpIng)addRcpIng.onclick=function(){S.rcpForm.ings.push({name:'',qty:'',unit:'g',isFlour:false});render()};

  // Recipe method steps
  document.querySelectorAll('[data-rcpstep]').forEach(function(inp){inp.oninput=function(e){S.rcpForm.steps[parseInt(inp.dataset.rcpstep)]=e.target.value}});
  document.querySelectorAll('[data-rcpstep-del]').forEach(function(b){b.onclick=function(){S.rcpForm.steps.splice(parseInt(b.dataset.rcpstepDel),1);if(!S.rcpForm.steps.length)S.rcpForm.steps.push('');render()}});
  var addRcpStep=document.getElementById('addRcpStep');if(addRcpStep)addRcpStep.onclick=function(){S.rcpForm.steps.push('');render()};

  // Save recipe
  var saveRcp=document.getElementById('saveRecipeBtn');if(saveRcp)saveRcp.onclick=function(){
    var f=S.rcpForm;if(!f.name){toast('\u274C Enter recipe name');return}
    if(S.saving)return;S.saving=true;
    var entry={type:'recipe',id:gid(),name:f.name,category:f.cat,yield:f.yield,yieldUnit:f.yieldUnit,prepTime:f.prep,bakeTime:f.bake,ovenTemp:f.temp,ingredients:JSON.parse(JSON.stringify(f.ings)),method:f.steps.filter(function(s){return s.trim()}),notes:f.notes,shelfLife:f.shelf,storage:f.storage,savedAt:new Date().toISOString(),savedBy:S.role};
    callApi('save',{},entry).then(function(){toast('\u2705 Recipe saved!');S.rcpAdding=false;resetRcpForm();return doFetch()}).catch(function(e){toast('\u274C '+e.message)}).then(function(){S.saving=false;render()})
  };

  // Analytics shop toggle
  document.querySelectorAll('[data-ashop]').forEach(function(b){b.onclick=function(){S.aShop=b.dataset.ashop;render()}});
  document.querySelectorAll('[data-execrpt]').forEach(function(b){b.onclick=function(){S.execRptPeriod=b.dataset.execrpt;render()}});
  var erf=document.getElementById('execRptFrom');if(erf)erf.onchange=function(){S.execRptFrom=erf.value};
  var ert=document.getElementById('execRptTo');if(ert)ert.onchange=function(){S.execRptTo=ert.value};
  var ger=document.getElementById('btnGenExecRpt');if(ger)ger.onclick=generateExecutiveReport;
  document.querySelectorAll('[data-pshop]').forEach(function(b){b.onclick=function(){S.pShop=b.dataset.pshop;render()}});
  document.querySelectorAll('[data-prange]').forEach(function(b){b.onclick=function(){S.pRange=b.dataset.prange;render()}});
  // Report date nav
  var rp=document.getElementById('rptPrev');if(rp)rp.onclick=function(){S.reportDate=dateOffset(S.reportDate,-1);render()};
  var rn=document.getElementById('rptNext');if(rn)rn.onclick=function(){if(S.reportDate<today()){S.reportDate=dateOffset(S.reportDate,1);render()}};
  // Pull to refresh
  var _ptrStart=0,_ptrActive=false;
  var appBody=document.querySelector('.app-body');
  if(appBody){
    appBody.addEventListener('touchstart',function(e){if(window.scrollY<=0)_ptrStart=e.touches[0].clientY},{passive:true});
    appBody.addEventListener('touchmove',function(e){if(_ptrStart&&e.touches[0].clientY-_ptrStart>60&&window.scrollY<=0){_ptrActive=true;var ind=document.querySelector('.ptr-indicator');if(ind)ind.classList.add('active')}},{passive:true});
    appBody.addEventListener('touchend',function(){if(_ptrActive){_ptrActive=false;_ptrStart=0;doFetch()}else{_ptrStart=0}},{passive:true});
  }
}

render();
if(S.darkMode)document.body.classList.add('dark');
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
</script>
</body>
</html>
